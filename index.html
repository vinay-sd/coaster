<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!--
    DEPLOYMENT INSTRUCTIONS
    ───────────────────────
    1. Place this index.html and your .mind file in the same Netlify folder.
    2. Rename your .mind file to:  targets.mind
    3. That's it — no other assets needed.
  -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── MindAR scanning overlay ─────────────────────────── */
    #scanning-overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0;
      pointer-events: none;
      z-index: 30;
    }
    /* MindAR toggles .hidden to hide it */
    #scanning-overlay.hidden { display: none; }

    .scan-frame {
      position: relative;
      width: 220px; height: 220px;
      margin-bottom: 36px;
    }

    /* Four corner brackets */
    .scan-frame::before, .scan-frame::after,
    .scan-frame .c::before, .scan-frame .c::after {
      content: ''; position: absolute;
      width: 34px; height: 34px;
    }
    .scan-frame::before {
      top: 0; left: 0;
      border-top: 3px solid #fff; border-left: 3px solid #fff;
      border-radius: 4px 0 0 0;
    }
    .scan-frame::after {
      top: 0; right: 0;
      border-top: 3px solid #fff; border-right: 3px solid #fff;
      border-radius: 0 4px 0 0;
    }
    .scan-frame .c::before {
      bottom: 0; left: 0;
      border-bottom: 3px solid #fff; border-left: 3px solid #fff;
      border-radius: 0 0 0 4px;
    }
    .scan-frame .c::after {
      bottom: 0; right: 0;
      border-bottom: 3px solid #fff; border-right: 3px solid #fff;
      border-radius: 0 0 4px 0;
    }

    /* Animated sweep line */
    .scan-line {
      position: absolute; left: 6px; right: 6px; height: 2px;
      border-radius: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.9), transparent);
      animation: sweep 2.4s ease-in-out infinite;
    }
    @keyframes sweep {
      0%   { top: 6px;   opacity: 0; }
      15%  { opacity: 1; }
      85%  { opacity: 1; }
      100% { top: 212px; opacity: 0; }
    }

    .scan-label {
      color: rgba(255,255,255,0.88);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-shadow: 0 1px 8px rgba(0,0,0,0.6);
    }
    .scan-sub {
      margin-top: 10px;
      color: rgba(255,255,255,0.4);
      font-size: 11px;
      letter-spacing: 0.5px;
    }

    /* ─── Action panel (slides up on target found) ──────────── */
    #action-panel {
      position: fixed;
      left: 0; right: 0; bottom: -300px;
      z-index: 40;

      background: rgba(6, 8, 20, 0.97);
      backdrop-filter: blur(30px) saturate(160%);
      -webkit-backdrop-filter: blur(30px) saturate(160%);

      border-top: 1px solid rgba(255,255,255,0.07);
      border-radius: 24px 24px 0 0;
      padding: 14px 28px 50px;

      transition: bottom 0.52s cubic-bezier(0.34, 1.36, 0.64, 1);
    }
    #action-panel.visible { bottom: 0; }

    /* Drag handle */
    .handle {
      width: 40px; height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      margin: 0 auto 24px;
    }

    /* Brand row */
    .brand-row {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 28px;
    }

    .brand-logo {
      flex-shrink: 0;
      width: 48px; height: 48px;
      border-radius: 14px;
      background: linear-gradient(140deg, #1a3fa0, #0d6ee0);
      box-shadow: 0 4px 18px rgba(13,110,224,0.45);
      display: flex; align-items: center; justify-content: center;
    }
    /* Inline SVG window-pane icon */
    .brand-logo svg { width: 26px; height: 26px; fill: #fff; }

    .brand-name {
      color: #fff;
      font-size: 15px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
    }
    .brand-contact {
      margin-top: 4px;
      color: rgba(255,255,255,0.35);
      font-size: 11px; letter-spacing: 0.3px;
    }

    /* Separator */
    .sep { height: 1px; background: rgba(255,255,255,0.06); margin-bottom: 28px; }

    /* Button row */
    .btn-row {
      display: flex; justify-content: space-around; align-items: center;
    }

    .cta {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    .cta-icon {
      width: 66px; height: 66px;
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.14s ease, opacity 0.14s;
    }
    .cta:active .cta-icon { transform: scale(0.87); opacity: 0.85; }
    .cta-icon svg { width: 28px; height: 28px; fill: #fff; }

    .cta-icon.call {
      background: linear-gradient(145deg, #1563d0, #07aaff);
      box-shadow: 0 8px 26px rgba(7,170,255,0.35);
    }
    .cta-icon.mail {
      background: linear-gradient(145deg, #d43326, #f0663a);
      box-shadow: 0 8px 26px rgba(212,51,38,0.35);
    }
    .cta-icon.wa {
      background: linear-gradient(145deg, #1aad4e, #22e06a);
      box-shadow: 0 8px 26px rgba(34,224,106,0.35);
    }

    .cta-label {
      color: rgba(255,255,255,0.45);
      font-size: 11px; font-weight: 500;
      letter-spacing: 0.8px; text-transform: uppercase;
    }
  </style>
</head>
<body>

  <!-- ── Custom scanning overlay (MindAR will show/hide this) ── -->
  <div id="scanning-overlay" class="hidden">
    <div class="scan-frame">
      <div class="c"></div>
      <div class="scan-line"></div>
    </div>
    <p class="scan-label">Scan the card</p>
    <p class="scan-sub">Point your camera at the business card</p>
  </div>

  <!-- ── Action panel ── -->
  <div id="action-panel">
    <div class="handle"></div>

    <div class="brand-row">
      <!-- Window-pane logo (pure SVG, zero external file) -->
      <div class="brand-logo">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

          <rect x="13"   y="2"    width="9" height="9"  rx="2"/>
          <rect x="2"    y="13"   width="9" height="9"  rx="2"/>

        </svg>
      </div>
      <div>
        <div class="brand-name">Creative Windows</div>
        <div class="brand-contact">Rajesh &nbsp;·&nbsp; +91 770 929 0535</div>
      </div>
    </div>

    <div class="sep"></div>

    <div class="btn-row">

      <!-- Call -->
      <a class="cta" href="tel:+917709290535">
        <div class="cta-icon call">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

                     2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
          </svg>
        </div>
        <span class="cta-label">Call</span>
      </a>

      <!-- Email -->
      <a class="cta" href="mailto:creativewindows.rajesh@gmail.com">
        <div class="cta-icon mail">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9
                     2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
          </svg>
        </div>
        <span class="cta-label">Email</span>
      </a>

      <!-- WhatsApp -->
      <a class="cta" href="https://wa.me/917709290535" target="_blank" rel="noopener">
        <div class="cta-icon wa">

                     -.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297

                     -.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298
                     .298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207
                     -.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52
                     .074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875
                     1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694

                     9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893
                     6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815
                     11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142
                     1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683

                     00-3.48-8.413z"/>
          </svg>
        </div>
        <span class="cta-label">WhatsApp</span>
      </a>

    </div>
  </div>

  <!-- ── MindAR + A-Frame Scene ─────────────────────────────────────────
       imageTargetSrc points to targets.mind in the same folder.
       uiScanning hands our custom overlay to MindAR so it shows/hides it.
  ──────────────────────────────────────────────────────────────────────── -->
  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #scanning-overlay;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >

    <a-camera
      position="0 0 0"
      look-controls="enabled: false"
      cursor="fuse: false; rayOrigin: mouse; emitevents: true"
      raycaster="near: 0.1; far: 10000; objects: .clickable"
    ></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" id="card-target">

      <!-- ── Card base plate ───────────────────────────────── -->
      <!-- width=1 matches the target image width exactly.
           Adjust height to match your card's aspect ratio.
           (Original file used 0.552 — keeping that.) -->
      <a-plane
        color="#0b1640"
        width="1" height="0.552"
        position="0 0 0" rotation="0 0 0"
      ></a-plane>

      <!-- Top accent bar -->
      <a-plane
        color="#1563d0"
        width="1" height="0.018"
        position="0 0.267 0.001" rotation="0 0 0"
      ></a-plane>

      <!-- Bottom accent bar -->
      <a-plane
        color="#1563d0"
        width="1" height="0.018"
        position="0 -0.267 0.001" rotation="0 0 0"
      ></a-plane>

      <!-- Top-left corner square -->
      <a-plane
        color="#122060"
        width="0.11" height="0.11"
        position="-0.44 0.22 0.001" rotation="0 0 0"
      ></a-plane>

      <!-- Bottom-right corner square -->
      <a-plane
        color="#122060"
        width="0.11" height="0.11"
        position="0.44 -0.22 0.001" rotation="0 0 0"
      ></a-plane>

      <!-- Company name -->
      <a-text
        value="CREATIVE WINDOWS"
        position="0 0.04 0.002"
        align="center"
        color="#ffffff"
        width="1.8"
        wrap-count="22"
      ></a-text>

      <!-- Tagline -->
      <a-text
        value="scan to connect"
        position="0 -0.1 0.002"
        align="center"
        color="#5b9ee8"
        width="1.2"
        wrap-count="22"
      ></a-text>

      <!-- ── Phone button (SVG icon via data URI, no external file) ── -->
      <a-image
        id="phoneBtn"
        class="clickable"
        src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%231563d0'/%3E%3Cpath fill='white' d='M35 40.5c2.9 5.6 7.5 10.2 13.1 13.1l4.4-4.4c.5-.5 1.3-.7 2-.5 2.2.7 4.7 1.1 7.1 1.1 1.1 0 2 .9 2 2v7c0 1.1-.9 2-2 2-18.8 0-34-15.2-34-34 0-1.1.9-2 2-2h7c1.1 0 2 .9 2 2 0 2.5.4 4.9 1.1 7.1.2.7 0 1.5-.5 2l-4.3 4.6z'/%3E%3C/svg%3E"
        position="-0.25 -0.19 0.01"
        width="0.1" height="0.1"
      ></a-image>

      <!-- ── Email button ── -->
      <a-image
        id="mailBtn"
        class="clickable"
        src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%23d43326'/%3E%3Cpath fill='white' d='M72 34H28c-2.2 0-4 1.8-4 4v24c0 2.2 1.8 4 4 4h44c2.2 0 4-1.8 4-4V38c0-2.2-1.8-4-4-4zm0 8L50 56 28 42v-4l22 14 22-14v4z'/%3E%3C/svg%3E"
        position="0 -0.19 0.01"
        width="0.1" height="0.1"
      ></a-image>

      <!-- ── WhatsApp button ── -->
      <a-image
        id="waBtn"
        class="clickable"
        src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%231aad4e'/%3E%3Cpath fill='white' d='M50 18C32.3 18 18 32.3 18 50c0 5.6 1.5 10.9 4.2 15.5L18 82l17-4.1C39.5 80.5 44.6 82 50 82c17.7 0 32-14.3 32-32S67.7 18 50 18zm16 44.3c-.6 1.4-3.5 2.7-4.8 2.8-1.3.2-2.9.3-4.7-.3-1.1-.4-2.5-.9-4.3-1.7-7.6-3.3-12.6-10.9-13-11.4-.4-.5-3.2-4.3-3.2-8.2 0-3.9 2-6 2.7-6.8.7-.8 1.6-.9 2.1-.9h1.5c.5 0 1.1-.2 1.7 1.3.6 1.5 2.1 5.1 2.3 5.5.2.4.3.8 0 1.3-.5 1-.9 1.4-1.3 1.9-.4.5-.9 1-.4 2 .5.9 2.3 3.8 4.9 6.1 3.4 3 6.2 3.9 7.1 4.3.9.4 1.4.4 1.9-.2.5-.6 2.2-2.6 2.8-3.5.6-.9 1.2-.7 2-.4.8.3 5.2 2.5 6.1 2.9.9.5 1.5.7 1.7 1 .2.4.2 1.7-.4 3z'/%3E%3C/svg%3E"
        position="0.25 -0.19 0.01"
        width="0.1" height="0.1"
      ></a-image>

    </a-entity>
  </a-scene>

  <script>
    /* ── Action panel: show/hide on target found/lost ── */
    const panel  = document.getElementById('action-panel');
    const target = document.getElementById('card-target');

    target.addEventListener('targetFound', () => panel.classList.add('visible'));
    target.addEventListener('targetLost',  () => panel.classList.remove('visible'));

    /* ── 3D icon click handlers ── */
    document.getElementById('phoneBtn').addEventListener('click', () => {
      window.location.href = 'tel:+917709290535';
    });
    document.getElementById('mailBtn').addEventListener('click', () => {
      window.location.href = 'mailto:creativewindows.rajesh@gmail.com';
    });
    document.getElementById('waBtn').addEventListener('click', () => {
      window.open('https://wa.me/917709290535', '_blank');
    });
  </script>

</body>
</html>
