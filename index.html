<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    }

    #scanning-overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      pointer-events: none;
      z-index: 30;
    }
    #scanning-overlay.hidden { display: none; }

    .scan-frame {
      position: relative;
      width: 220px; height: 220px;
      margin-bottom: 36px;
    }

    .scan-frame::before, .scan-frame::after,
    .scan-frame .c::before, .scan-frame .c::after {
      content: ''; position: absolute;
      width: 34px; height: 34px;
    }

    .scan-frame::before {
      top: 0; left: 0;
      border-top: 3px solid #fff; border-left: 3px solid #fff;
    }
    .scan-frame::after {
      top: 0; right: 0;
      border-top: 3px solid #fff; border-right: 3px solid #fff;
    }
    .scan-frame .c::before {
      bottom: 0; left: 0;
      border-bottom: 3px solid #fff; border-left: 3px solid #fff;
    }
    .scan-frame .c::after {
      bottom: 0; right: 0;
      border-bottom: 3px solid #fff; border-right: 3px solid #fff;
    }

    .scan-line {
      position: absolute; left: 6px; right: 6px; height: 2px;
      background: linear-gradient(90deg, transparent, #fff, transparent);
      animation: sweep 2.4s infinite;
    }

    @keyframes sweep {
      0% { top: 6px; opacity: 0; }
      50% { opacity: 1; }
      100% { top: 212px; opacity: 0; }
    }

    #action-panel {
      position: fixed;
      left: 0; right: 0; bottom: -300px;
      background: rgba(6, 8, 20, 0.97);
      border-radius: 24px 24px 0 0;
      padding: 20px;
      transition: bottom 0.5s;
      z-index: 40;
    }
    #action-panel.visible { bottom: 0; }

    .btn-row {
      display: flex; justify-content: space-around;
    }

    .cta {
      text-align: center;
      color: #fff;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div id="scanning-overlay" class="hidden">
  <div class="scan-frame">
    <div class="c"></div>
    <div class="scan-line"></div>
  </div>
  <p style="color:#fff">Scan the card</p>
</div>

<div id="action-panel">
  <div class="btn-row">
    <a class="cta" href="tel:+917709290535">Call</a>
    <a class="cta" href="mailto:creativewindows.rajesh@gmail.com">Email</a>
    <a class="cta" href="https://wa.me/917709290535" target="_blank">WhatsApp</a>
  </div>
</div>

<a-scene
  mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #scanning-overlay;"
  color-space="sRGB"
  renderer="colorManagement: true;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

  <a-camera
    position="0 0 0"
    look-controls="enabled: false"
    cursor="fuse: false; rayOrigin: mouse; emitEvents: true"
    raycaster="near: 0.1; far: 10000; objects: .clickable"
  ></a-camera>

  <a-entity mindar-image-target="targetIndex: 0" id="card-target">

    <a-plane color="#0b1640" width="1" height="0.552"></a-plane>

    <a-text
      value="CREATIVE WINDOWS"
      position="0 0.05 0.01"
      align="center"
      color="#ffffff"
      width="1.8"
    ></a-text>

    <a-image
      id="phoneBtn"
      class="clickable"
      src="https://cdn-icons-png.flaticon.com/512/724/724664.png"
      position="-0.3 -0.2 0.01"
      width="0.15" height="0.15"
    ></a-image>

    <a-image
      id="mailBtn"
      class="clickable"
      src="https://cdn-icons-png.flaticon.com/512/732/732200.png"
      position="0 -0.2 0.01"
      width="0.15" height="0.15"
    ></a-image>

    <a-image
      id="waBtn"
      class="clickable"
      src="https://cdn-icons-png.flaticon.com/512/733/733585.png"
      position="0.3 -0.2 0.01"
      width="0.15" height="0.15"
    ></a-image>

  </a-entity>
</a-scene>

<script>
window.addEventListener('DOMContentLoaded', () => {

  const panel  = document.getElementById('action-panel');
  const target = document.getElementById('card-target');

  target.addEventListener('targetFound', () => panel.classList.add('visible'));
  target.addEventListener('targetLost', () => panel.classList.remove('visible'));

  document.getElementById('phoneBtn').onclick = () => {
    window.location.href = 'tel:+917709290535';
  };

  document.getElementById('mailBtn').onclick = () => {
    window.location.href = 'mailto:creativewindows.rajesh@gmail.com';
  };

  document.getElementById('waBtn').onclick = () => {
    window.open('https://wa.me/917709290535', '_blank');
  };

});
</script>

</body>
</html>
