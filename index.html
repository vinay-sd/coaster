<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!--
    DEPLOYMENT
    ─────────────────────────────────────────────────────────────────
    1. Compile the coaster photo at the MindAR compiler tool:
       https://hiukim.github.io/mind-ar-js-doc/tools/compile
    2. Save the output file as:  targets.mind
    3. Place targets.mind + this index.html in the same folder
    4. Deploy to Netlify / Vercel (HTTPS required for camera access)
    5. Update the Instagram / LinkedIn / Website hrefs at the bottom
    ─────────────────────────────────────────────────────────────────
    AR DESIGN CONCEPT
    The coaster itself shows through the camera — no opaque plane
    covers it. Everything emerges *around* and *above* the coaster:
      • Two counter-rotating halo rings orbit the perimeter
      • A tilted golden portal ring floats above with a riding sphere
      • Three spheres orbit the coaster at different speeds / radii
      • The "drishti" (vision) eye motif pulses above the coaster
      • "SOCIAL DRISHTI" text bobs gently high above
      • Four keyword pills float on the sides (INSIGHTS / STRATEGY
        / VISION / IMPACT), each with a gentle breathing animation
      • Six rising particles stream upward on loop
  -->

  <!-- A-Frame FIRST, then MindAR (MindAR must patch A-Frame on load) -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden; background: #0a0305;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── SCANNING OVERLAY ─────────────────────────────────────── */
    #scanning-overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      pointer-events: none; z-index: 30;
    }
    #scanning-overlay.hidden { display: none; }

    .scan-frame { position: relative; width: 220px; height: 220px; margin-bottom: 20px; }

    /* Rounded-square corners to hint at the coaster shape */
    .scan-frame::before, .scan-frame::after,
    .scan-frame .c::before, .scan-frame .c::after {
      content: ''; position: absolute; width: 38px; height: 38px;
    }
    .scan-frame::before  { top:0; left:0;  border-top:2.5px solid #F5A623; border-left:2.5px solid #F5A623;   border-radius:11px 0 0 0; }
    .scan-frame::after   { top:0; right:0; border-top:2.5px solid #F5A623; border-right:2.5px solid #F5A623;  border-radius:0 11px 0 0; }
    .scan-frame .c::before { bottom:0; left:0;  border-bottom:2.5px solid #F5A623; border-left:2.5px solid #F5A623;  border-radius:0 0 0 11px; }
    .scan-frame .c::after  { bottom:0; right:0; border-bottom:2.5px solid #F5A623; border-right:2.5px solid #F5A623; border-radius:0 0 11px 0; }

    .scan-inner {
      position: absolute; inset: 16px; border-radius: 10px;
      background: rgba(139,90,113,0.1); border: 1px solid rgba(245,166,35,0.13);
      display: flex; align-items: center; justify-content: center;
    }

    /* Recreate the SD "O" ring as the scan hint */
    .sd-hint-ring {
      width: 50px; height: 50px; border-radius: 50%;
      border: 7px solid rgba(245,166,35,0.55); border-bottom-color: transparent;
      animation: spin-hint 2s linear infinite;
    }
    @keyframes spin-hint { to { transform: rotate(360deg); } }

    .scan-line {
      position: absolute; left: 16px; right: 16px; height: 1.5px;
      background: linear-gradient(90deg, transparent, rgba(245,166,35,0.75), transparent);
      animation: sweep 2.2s ease-in-out infinite;
    }
    @keyframes sweep {
      0%   { top:16px;  opacity:0; }
      15%  { opacity:1; }
      85%  { opacity:1; }
      100% { top:204px; opacity:0; }
    }

    .scan-label { color: rgba(255,255,255,0.85); font-size:12px; font-weight:700; letter-spacing:3.5px; text-transform:uppercase; text-shadow:0 1px 10px rgba(0,0,0,0.9); }
    .scan-sub   { margin-top:8px; color:rgba(245,237,232,0.3); font-size:11px; }

    /* ─── ACTION PANEL ─────────────────────────────────────────── */
    #action-panel {
      position: fixed; left:0; right:0; bottom:-340px; z-index:40;
      background: rgba(14,4,8,0.97);
      backdrop-filter: blur(32px) saturate(160%);
      -webkit-backdrop-filter: blur(32px) saturate(160%);
      border-top: 1px solid rgba(245,166,35,0.16);
      border-radius: 26px 26px 0 0;
      padding: 14px 28px 62px;
      transition: bottom 0.54s cubic-bezier(0.34, 1.36, 0.64, 1);
    }
    #action-panel.visible { bottom:0; }

    .handle { width:40px; height:4px; background:rgba(245,166,35,0.18); border-radius:2px; margin:0 auto 28px; }

    .brand-row { display:flex; align-items:center; gap:16px; margin-bottom:26px; }

    .brand-logo {
      flex-shrink:0; width:54px; height:54px; border-radius:16px;
      background: rgba(245,166,35,0.07); border:1.5px solid rgba(245,166,35,0.22);
      display:flex; align-items:center; justify-content:center;
    }
    .sd-logo-ring {
      width:30px; height:30px; border-radius:50%;
      border:6px solid #F5A623; border-right-color:rgba(30,8,15,0.7);
      transform:rotate(-20deg);
    }

    .brand-name { color:#F5A623; font-size:15px; font-weight:700; letter-spacing:2px; text-transform:uppercase; }
    .brand-tag  { margin-top:3px; color:rgba(245,237,232,0.35); font-size:11px; letter-spacing:0.3px; font-style:italic; }
    .ar-badge   { display:inline-block; margin-top:7px; background:rgba(245,166,35,0.09); border:1px solid rgba(245,166,35,0.26); border-radius:5px; padding:2px 8px; color:#F5A623; font-size:10px; font-weight:600; letter-spacing:2px; }

    .sep { height:1px; background:rgba(245,166,35,0.1); margin-bottom:28px; }

    .btn-row { display:flex; justify-content:space-around; align-items:center; }
    .cta { display:flex; flex-direction:column; align-items:center; gap:10px; text-decoration:none; -webkit-tap-highlight-color:transparent; }
    .cta-icon { width:68px; height:68px; border-radius:21px; display:flex; align-items:center; justify-content:center; transition:transform 0.13s ease, opacity 0.13s; }
    .cta:active .cta-icon { transform:scale(0.87); opacity:0.8; }
    .cta-icon svg { width:28px; height:28px; fill:#fff; }

    .cta-icon.insta  { background:linear-gradient(145deg,#833ab4,#e1306c,#f77737); box-shadow:0 8px 24px rgba(131,58,180,0.3); }
    .cta-icon.linked { background:linear-gradient(145deg,#0a66c2,#00a0dc);          box-shadow:0 8px 24px rgba(10,102,194,0.3); }
    .cta-icon.web    { background:linear-gradient(145deg,#7A4E60,#C4956A);           box-shadow:0 8px 24px rgba(122,78,96,0.35); }

    .cta-label { color:rgba(245,237,232,0.32); font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; }
  </style>
</head>
<body>

  <!-- ── Scanning overlay ─────────────────────────────────────────── -->
  <div id="scanning-overlay" class="hidden">
    <div class="scan-frame">
      <div class="c"></div>
      <div class="scan-inner"><div class="sd-hint-ring"></div></div>
      <div class="scan-line"></div>
    </div>
    <p class="scan-label">Find the coaster</p>
    <p class="scan-sub">Point your camera at the Social Drishti coaster</p>
  </div>

  <!-- ── Action panel ─────────────────────────────────────────────── -->
  <div id="action-panel">
    <div class="handle"></div>
    <div class="brand-row">
      <div class="brand-logo"><div class="sd-logo-ring"></div></div>
      <div>
        <div class="brand-name">Social Drishti</div>
        <div class="brand-tag">Looking Beyond The Obvious</div>
        <div class="ar-badge">AR EXPERIENCE</div>
      </div>
    </div>
    <div class="sep"></div>
    <div class="btn-row">

      <!-- ↓ Update href values with real Social Drishti links ↓ -->
      <a class="cta" href="https://instagram.com/socialdrishti" target="_blank" rel="noopener">
        <div class="cta-icon insta">
          <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
        </div>
        <span class="cta-label">Instagram</span>
      </a>

      <a class="cta" href="https://linkedin.com/company/socialdrishti" target="_blank" rel="noopener">
        <div class="cta-icon linked">
          <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        </div>
        <span class="cta-label">LinkedIn</span>
      </a>

      <a class="cta" href="https://socialdrishti.com" target="_blank" rel="noopener">
        <div class="cta-icon web">
          <svg viewBox="0 0 24 24"><path d="M12 0C5.374 0 0 5.373 0 12c0 6.628 5.374 12 12 12 6.628 0 12-5.372 12-12 0-6.627-5.372-12-12-12zm0 2c1.308 0 2.564.253 3.714.713C14.786 3.67 14 4.83 14 6v1a2 2 0 01-2 2H9a2 2 0 00-2 2v1a2 2 0 002 2 2 2 0 012 2v3a2 2 0 01-1.414 1.914C5.816 17.72 2 15.08 2 12 2 6.477 6.477 2 12 2zm6.506 5.06A9.967 9.967 0 0122 12c0 4.42-2.87 8.17-6.84 9.49L14 20v-1a2 2 0 00-2-2 2 2 0 01-2-2v-2a2 2 0 012-2 2 2 0 002-2V9c0-1.476.8-2.77 2-3.476l.506-.464z"/></svg>
        </div>
        <span class="cta-label">Website</span>
      </a>

    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════
       A-FRAME + MINDAR AR SCENE
       Target = 1×1 square (coaster). ALL content floats AROUND it.
  ═══════════════════════════════════════════════════════════════════ -->
  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #scanning-overlay;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" id="coaster-target">

      <!-- ───────────────────────────────────────────────────────────
           HALO RINGS  (radius > 0.71 clears the full 1×1 square)
      ─────────────────────────────────────────────────────────────── -->

      <!-- Outer golden ring — slow CW spin -->
      <a-torus color="#F5A623" radius="0.76" radius-tubular="0.009" position="0 0 0.015"
        animation="property: rotation; from: 0 0 0; to: 0 0 360; dur: 17000; loop: true; easing: linear">
      </a-torus>

      <!-- Inner mauve ring — CCW, slower -->
      <a-torus color="#9E6B7A" radius="0.64" radius-tubular="0.005" position="0 0 0.022"
        animation="property: rotation; from: 0 0 0; to: 0 0 -360; dur: 26000; loop: true; easing: linear">
      </a-torus>

      <!-- Tilted portal ring above the coaster (appears as an ellipse in 3D perspective) -->
      <a-torus color="#F5A623" radius="0.4" radius-tubular="0.013"
        position="0 0.66 0.2" rotation="65 0 0"
        animation="property: rotation; from: 65 0 0; to: 65 360 0; dur: 10000; loop: true; easing: linear">
      </a-torus>


      <!-- ───────────────────────────────────────────────────────────
           ORBITING SPHERES
           Rotating parent entity → offset child sphere = circular orbit
      ─────────────────────────────────────────────────────────────── -->

      <!-- Fast golden sphere — inner orbit -->
      <a-entity position="0 0 0.04"
        animation="property: rotation; from: 0 0 0; to: 0 0 360; dur: 5400; loop: true; easing: linear">
        <a-sphere color="#F5A623" radius="0.042" position="0.74 0 0"></a-sphere>
      </a-entity>

      <!-- Medium cream sphere — outer orbit, 120° offset start -->
      <a-entity position="0 0 0.04" rotation="0 0 120"
        animation="property: rotation; from: 0 0 120; to: 0 0 480; dur: 9800; loop: true; easing: linear">
        <a-sphere color="#F5EDE8" radius="0.03" position="0.88 0 0"></a-sphere>
      </a-entity>

      <!-- Slow tan sphere — mid orbit, 240° offset start -->
      <a-entity position="0 0 0.04" rotation="0 0 240"
        animation="property: rotation; from: 0 0 240; to: 0 0 600; dur: 15000; loop: true; easing: linear">
        <a-sphere color="#C09080" radius="0.023" position="0.81 0 0"></a-sphere>
      </a-entity>

      <!-- Small sphere riding the portal ring -->
      <a-entity position="0 0.66 0.2" rotation="65 0 0"
        animation="property: rotation; from: 65 0 0; to: 65 360 0; dur: 6200; loop: true; easing: linear">
        <a-sphere color="#F5A623" radius="0.034" position="0.4 0 0"></a-sphere>
      </a-entity>


      <!-- ───────────────────────────────────────────────────────────
           EYE / DRISHTI MOTIF
           "Drishti" = vision / sight in Sanskrit.
           The eye floats above the coaster and blinks via scale.
      ─────────────────────────────────────────────────────────────── -->

      <a-entity position="0 0.66 0.15">

        <!-- Outer eye ellipse — golden, breathing scale -->
        <a-torus color="#F5A623" radius="0.22" radius-tubular="0.015"
          scale="2.0 1.0 1.0"
          animation="property: scale; from: 2.0 1.0 1.0; to: 2.2 1.12 1.0; dur: 2900; loop: true; dir: alternate; easing: easeInOutSine">
        </a-torus>

        <!-- Iris — deep wine fill -->
        <a-circle color="#3D1E2C" radius="0.096" position="0 0 0.001"></a-circle>

        <!-- Mauve iris ring -->
        <a-torus color="#9E6B7A" radius="0.078" radius-tubular="0.007" position="0 0 0.012"></a-torus>

        <!-- Pupil — contracts like a real pupil -->
        <a-sphere color="#0F0608" radius="0.055" position="0 0 0.022"
          animation="property: scale; from: 1 1 1; to: 0.55 0.55 0.55; dur: 2500; loop: true; dir: alternate; easing: easeInOutQuad">
        </a-sphere>

        <!-- Golden highlight dot — gives the eye life -->
        <a-sphere color="#F5A623" radius="0.017" position="0.024 0.025 0.08"></a-sphere>

      </a-entity>


      <!-- ───────────────────────────────────────────────────────────
           BRAND TEXT  (floats high above, gentle vertical bob)
      ─────────────────────────────────────────────────────────────── -->

      <a-text value="SOCIAL DRISHTI"
        position="0 1.28 0.1" align="center"
        color="#F5A623" width="2.7" wrap-count="20"
        animation="property: position; from: 0 1.25 0.1; to: 0 1.31 0.1; dur: 3500; loop: true; dir: alternate; easing: easeInOutSine">
      </a-text>

      <a-text value="Looking Beyond The Obvious"
        position="0 1.05 0.1" align="center"
        color="#F5EDE8" width="1.85" wrap-count="35"
        animation="property: scale; from: 0.97 0.97 0.97; to: 1.03 1.03 1.03; dur: 3200; loop: true; dir: alternate; easing: easeInOutSine">
      </a-text>

      <!-- Accent dot between eye and text -->
      <a-sphere color="#F5A623" radius="0.016" position="0 0.95 0.1"
        animation="property: scale; from: 1 1 1; to: 1.7 1.7 1.7; dur: 2000; loop: true; dir: alternate; easing: easeInOutSine">
      </a-sphere>


      <!-- ───────────────────────────────────────────────────────────
           FLOATING KEYWORD PILLS
           x = ±0.96 puts them outside the 1×1 coaster square.
           Each: dark bg plate + colored top bar + white/gold text.
           Alternating bob phases so they never move in unison.
      ─────────────────────────────────────────────────────────────── -->

      <!-- INSIGHTS — left upper -->
      <a-entity position="-0.96 0.3 0.14"
        animation="property: position; from: -0.96 0.26 0.14; to: -0.96 0.34 0.14; dur: 3100; loop: true; dir: alternate; easing: easeInOutSine">
        <a-plane color="#210D14" width="0.55" height="0.19"></a-plane>
        <a-plane color="#F5A623" width="0.55" height="0.013" position="0 0.088 0.001"></a-plane>
        <a-text value="INSIGHTS" align="center" color="#F5A623" width="0.64" wrap-count="12" position="0 -0.008 0.01"></a-text>
      </a-entity>

      <!-- STRATEGY — right upper (opposite phase) -->
      <a-entity position="0.96 0.3 0.14"
        animation="property: position; from: 0.96 0.34 0.14; to: 0.96 0.26 0.14; dur: 3600; loop: true; dir: alternate; easing: easeInOutSine">
        <a-plane color="#210D14" width="0.55" height="0.19"></a-plane>
        <a-plane color="#F5A623" width="0.55" height="0.013" position="0 0.088 0.001"></a-plane>
        <a-text value="STRATEGY" align="center" color="#F5A623" width="0.64" wrap-count="12" position="0 -0.008 0.01"></a-text>
      </a-entity>

      <!-- VISION — left lower (rose accent) -->
      <a-entity position="-0.96 -0.3 0.14"
        animation="property: position; from: -0.96 -0.34 0.14; to: -0.96 -0.26 0.14; dur: 4100; loop: true; dir: alternate; easing: easeInOutSine">
        <a-plane color="#210D14" width="0.55" height="0.19"></a-plane>
        <a-plane color="#9E6B7A" width="0.55" height="0.013" position="0 0.088 0.001"></a-plane>
        <a-text value="VISION" align="center" color="#F5EDE8" width="0.64" wrap-count="12" position="0 -0.008 0.01"></a-text>
      </a-entity>

      <!-- IMPACT — right lower (rose accent, offset phase) -->
      <a-entity position="0.96 -0.3 0.14"
        animation="property: position; from: 0.96 -0.26 0.14; to: 0.96 -0.34 0.14; dur: 4600; loop: true; dir: alternate; easing: easeInOutSine">
        <a-plane color="#210D14" width="0.55" height="0.19"></a-plane>
        <a-plane color="#9E6B7A" width="0.55" height="0.013" position="0 0.088 0.001"></a-plane>
        <a-text value="IMPACT" align="center" color="#F5EDE8" width="0.64" wrap-count="12" position="0 -0.008 0.01"></a-text>
      </a-entity>


      <!-- ───────────────────────────────────────────────────────────
           RISING PARTICLES
           Six particles at different X positions, different speeds.
           Each loops from near the coaster surface up out of frame.
           Varying durations → stay visually staggered over time.
      ─────────────────────────────────────────────────────────────── -->

      <a-sphere radius="0.022" color="#F5A623" position="-0.26 -0.18 0.03"
        animation="property: position; from: -0.26 -0.18 0.03; to: -0.26 1.65 0.03; dur: 4200; loop: true; easing: linear">
      </a-sphere>

      <a-sphere radius="0.015" color="#F5EDE8" position="0.19 0.22 0.03"
        animation="property: position; from: 0.19 0.22 0.03; to: 0.19 1.9 0.03; dur: 5800; loop: true; easing: linear">
      </a-sphere>

      <a-sphere radius="0.019" color="#F5A623" position="0.31 -0.24 0.03"
        animation="property: position; from: 0.31 -0.24 0.03; to: 0.31 1.55 0.03; dur: 3600; loop: true; easing: linear">
      </a-sphere>

      <a-sphere radius="0.012" color="#C09080" position="-0.09 0.29 0.03"
        animation="property: position; from: -0.09 0.29 0.03; to: -0.09 1.75 0.03; dur: 6400; loop: true; easing: linear">
      </a-sphere>

      <a-sphere radius="0.017" color="#F5A623" position="0.09 -0.37 0.03"
        animation="property: position; from: 0.09 -0.37 0.03; to: 0.09 1.5 0.03; dur: 4000; loop: true; easing: linear">
      </a-sphere>

      <a-sphere radius="0.013" color="#F5EDE8" position="-0.39 0.08 0.03"
        animation="property: position; from: -0.39 0.08 0.03; to: -0.39 1.8 0.03; dur: 5200; loop: true; easing: linear">
      </a-sphere>

    </a-entity>
  </a-scene>

  <script>
    const panel  = document.getElementById('action-panel');
    const target = document.getElementById('coaster-target');
    target.addEventListener('targetFound', () => panel.classList.add('visible'));
    target.addEventListener('targetLost',  () => panel.classList.remove('visible'));
  </script>

</body>
</html>
